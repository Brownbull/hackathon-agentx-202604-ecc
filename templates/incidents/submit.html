{% extends "base.html" %}
{% block title %}Report Incident — SRE Triage Agent{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Report New Incident</h1>
</div>

<form id="incident-form"
      hx-post="/api/incidents"
      hx-encoding="multipart/form-data"
      hx-target="#form-result"
      hx-swap="innerHTML"
      hx-indicator="#submit-spinner"
      class="form-card">

    <div class="form-group">
        <label for="reporter_name">Your Name</label>
        <input type="text" id="reporter_name" name="reporter_name" placeholder="Jane Doe">
    </div>

    <div class="form-group">
        <label for="reporter_email">Email *</label>
        <input type="email" id="reporter_email" name="reporter_email" required placeholder="jane@example.com">
    </div>

    <div class="form-group">
        <label for="reporter_team">Reporting Team</label>
        <select id="reporter_team" name="reporter_team">
            <option value="other">&#128101; Other</option>
            <option value="payments-team">&#128179; Payments Team</option>
            <option value="platform-team">&#9881; Platform Team</option>
            <option value="frontend-team">&#127912; Frontend Team</option>
            <option value="infrastructure-team">&#9729; Infrastructure Team</option>
            <option value="security-team">&#128274; Security Team</option>
            <option value="fulfillment-team">&#128230; Fulfillment Team</option>
        </select>
    </div>

    <div class="form-group">
        <label for="description">Incident Description *</label>
        <textarea id="description" name="description" rows="6" required minlength="10"
                  placeholder="Describe what happened, what you expected, and any error messages you saw..."></textarea>
    </div>

    <div class="form-group">
        <label for="files">Attachments</label>
        <input type="file" id="files" name="files" multiple
               accept="image/*,.txt,.pdf,.json,.csv">
        <small class="help-text">Screenshots, logs, or data files &mdash; max 5MB each</small>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">
            &#128640; Submit Incident
            <span id="submit-spinner" class="htmx-indicator spinner"></span>
        </button>
        <a href="/incidents" class="btn btn-secondary">&#8592; Cancel</a>
    </div>
</form>

<div id="form-result"></div>

<script>
    document.body.addEventListener('htmx:afterRequest', function(event) {
        var resultDiv = document.getElementById('form-result');
        if (event.detail.successful && event.detail.xhr.status === 201) {
            var data = JSON.parse(event.detail.xhr.responseText);
            var id = data.id;
            var shortId = id.substring(0, 8);
            resultDiv.innerHTML =
                '<div class="alert alert-success">' +
                    '<strong>&#10003; Incident registered</strong> &mdash; ID: <code>' + shortId + '</code>' +
                    '<br><a href="/incidents/' + id + '" class="alert-link">&#128270; View incident &amp; run triage &rarr;</a>' +
                '</div>';
            document.getElementById('incident-form').reset();
        } else {
            var msg = 'Something went wrong. Please try again.';
            try {
                var err = JSON.parse(event.detail.xhr.responseText);
                msg = err.detail || msg;
            } catch(e) {}
            resultDiv.innerHTML =
                '<div class="alert alert-error">&#9888; ' + msg + '</div>';
        }
    });
</script>
{% endblock %}
